# See: https://prek.j178.dev/configuration/

[[repos]]
repo = "builtin"
hooks = [
  { id = "detect-private-key" },
  { id = "check-json" },
  { id = "check-toml" },
  { id = "check-yaml" },
  { id = "trailing-whitespace" },
  { id = "end-of-file-fixer" },
]

[[repos]]
# Use local .venv version to ensure the same version of tools for all developers and CI
# Language is "system" instead of "python" to prevent prek from creating a second venv, which would be redundant and could cause issues with native dependencies
repo = "local"
hooks = [
  { id = "ruff-check", name = "ruff-check", entry = "uv run ruff check --fix", language = "system", types = ["python"] },
  { id = "ruff-format", name = "ruff-format", entry = "uv run ruff format", language = "system", types = ["python"] },
  # ty and lint-imports are whole-program checkers — a change in src/ can cause a type error in tests/ or an import violation across packages.
  # They must always run against the full codebase, not just the staged files. See https://github.com/astral-sh/ty/issues/269#issuecomment-3669333114
  { id = "ty-check", name = "ty check", entry = "uv run ty check", language = "system", types=["python"], pass_filenames = false, always_run = true },
  { id = "lint-imports", name = "lint-imports", entry = "uv run lint-imports", language = "system", types=["python"], pass_filenames = false, always_run = true },
]
