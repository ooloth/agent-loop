# See: https://docs.astral.sh/ruff/configuration/
# See: https://docs.astral.sh/ruff/settings/

line-length = 100
target-version = "py314"

[format]
docstring-code-format = true

[lint]
fixable = ["ALL"] # allow fix for all enabled rules (when `--fix`) is provided.
unfixable = []
extend-select = ["ANN", "B", "C4", "DTZ", "FBT", "I", "PERF", "PIE", "PT", "RET", "SIM", "TID251", "UP"]

[lint.isort]
known-first-party = ["agent_loop"]

[lint.flake8-tidy-imports.banned-api]
"typing.TYPE_CHECKING".msg = "Unnecessary on Python 3.14+. Use regular imports instead."
