# See: https://docs.astral.sh/ruff/configuration/
# See: https://docs.astral.sh/ruff/settings/

line-length = 100
target-version = "py314"

[format]
docstring-code-format = true

[lint]
fixable = ["ALL"] # allow fix for all enabled rules (when `--fix`) is provided.
unfixable = []
extend-select = [
    "ANN",    # flake8-annotations   – https://docs.astral.sh/ruff/rules/#flake8-annotations-ann
    "B",      # flake8-bugbear       – https://docs.astral.sh/ruff/rules/#flake8-bugbear-b
    "C4",     # flake8-comprehensions – https://docs.astral.sh/ruff/rules/#flake8-comprehensions-c4
    "DTZ",    # flake8-datetimez     – https://docs.astral.sh/ruff/rules/#flake8-datetimez-dtz
    "FBT",    # flake8-boolean-trap  – https://docs.astral.sh/ruff/rules/#flake8-boolean-trap-fbt
    "I",      # isort                – https://docs.astral.sh/ruff/rules/#isort-i
    "PERF",   # perflint             – https://docs.astral.sh/ruff/rules/#perflint-perf
    "PIE",    # flake8-pie           – https://docs.astral.sh/ruff/rules/#flake8-pie-pie
    "PT",     # flake8-pytest-style  – https://docs.astral.sh/ruff/rules/#flake8-pytest-style-pt
    "RET",    # flake8-return        – https://docs.astral.sh/ruff/rules/#flake8-return-ret
    "SIM",    # flake8-simplify      – https://docs.astral.sh/ruff/rules/#flake8-simplify-sim
    "TID251", # flake8-tidy-imports (banned-api) – https://docs.astral.sh/ruff/rules/#flake8-tidy-imports-tid
    "TID252", # flake8-tidy-imports (relative-imports) – https://docs.astral.sh/ruff/rules/#flake8-tidy-imports-tid
    "UP",     # pyupgrade            – https://docs.astral.sh/ruff/rules/#pyupgrade-up
]

[lint.isort]
known-first-party = ["agent_loop"]

[lint.flake8-tidy-imports.banned-api]
"typing.TYPE_CHECKING".msg = "Unnecessary on Python 3.14+. Use regular imports instead."
